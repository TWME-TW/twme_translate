      - "&c"
  lobby:
    games:
      name: "&aWorlds from all players &3[Right-click]"
      lore:
        - ""
        - "&7 This is a list of &aall worlds&7"
        - "&7 created by the community"
        - "&7 on our server."
        - ""
        - "&e Try visiting each world..."
        - ""
    own:
