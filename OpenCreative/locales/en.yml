      lore:
        - ""
        - "&7 Here are displayed"
        - "&b your worlds&7, which you"
        - "&7 have created."
        - ""
        - "&e If you don’t have any, it’s time to create one!"
        - ""
    changelogs:
      name: "&dChangelogs &3[Right-click]"
      lore:
        - ""
        - "&7 Discover about last &dupdate&7,"
        - "&7 that adds new features and fixes"
        - "&7 annoying errors."
        - ""
        - "&e You should read it all!"
        - ""
      pages:
        - "&0Version: &8%version%\n \n&2🌸 Debug Torch?!\n \n&0Now you can mark desired lines of code with a &4special torch&0 to display actions in debug mode using /env debug on.\n \n&aOpen next page..."
        - "&5☻ World Location Panel Settings\n \n&0In the world settings /world you can disable the &5location panel&0 that appeared in newer game versions.\n \n&0Useful for hide and seek!"
        - "&2✎ Biome Selection When Creating a World\n \n&0Some world generators can now have biome selection when creating a world.\n \n&0Among them: &3Snow biome&0, &6desert&0 and &4nether biomes&0."
        - "&5⭐ New Recommended Worlds Menu\n \n&0If the server has more than 21 recommended worlds, a new world selection menu will appear. There you can choose a suitable world category."
        - "&4⛏ New Actions\n \n&8- &0Code Control: &1Skip repeat&0, &1Stop repeat&0.\n \n&8- &0For mobs: &2Morph into another mob&0, &2Morph into block&0, &2Remove morphs&0."
        - "&4⛏ New Actions\n \n&8- &0Variables: &3Get block type&0, &3Get block side&0, &3Move location by vector&0, &3Get vector coordinates&0, &3Create dictionary from keys and values&0...\n"
        - "&4⛏ New Actions\n \n&8- &3Get first and last list values&0, &3Set custom item data&0, &3Get custom item data&0, &3Remove custom item data&0.\n&8- &0For player:\n&8Set spectator target&0."
        - "&5🏹 New Conditions\n \n&8- &0Player: &6In rain&0, &6In lava&0, &6Under water&0, &6In powder snow&0, &6In team&0, &6Inside vehicle&0, &6Dead&0.\n \n&8- &0Variable: &3Item has data key&0, &3Item has data&0..."
        - "&5🏹 New Conditions\n \n&8- &3First list element equals&0, &3Last list element equals&0, &3Element by index equals&0.\n \n&8- &0World: &4Player is in world&0."
        - "&4⌘ New Values\n \n&8- &0World: &4Selected targets count&0, &4Selected target names list&0, &4Selected target IDs list&0."
        - "&3🎣 Other Changes\n \n&8- &0Warnings for reaching some limits have been added.\n&8 &0- Now actions over world and variable will work even if the target left the world (but will not work if nobody is in the world!)."
        - "&3🎣 Other Changes\n \n&8- &0Game values selection menu updated.\n&8- &0Added command &2/give invisible_item_frame&0 to give an invisible item frame.\n&8- &0Clear items in code with command &5/env clearitems&0."
  developer:
    turned-on: "&a ● "
    turned-off: "&7 ○ "
    coding-book:
      name: "&bWelcome to Coding! &a[Right-click]"
      lore:
        - "&7This book will teach you"
        - "&7the basic concepts of coding."
      pages:
        - "&9☻ You are in the coding world!&r\n \nHere you will create code for your world using &3b&7l&6o&9c&c&rks in the inventory.\n \nThis book will help you learn the basics of coding, &cturn the page to continue..."
        - "&3⚂ Get to know the blocks!&r\n \nPlace &3event&0 blocks on &9blue glass&0 to trigger &7actions&0 and &6conditions&0, which you place on &8gray&0 glass."
        - "&3⚂ Get to know the blocks!&r\n \n&lWhat are events?!\n \n&3Player events&r happen when a player performs an action in the world, and then in the code, we execute actions and conditions on the player."
        - "&3⚂ Get to know the blocks!&r\n \n&lWhat are actions?\n \n&7Actions&r allow you to control the player: give items, teleport, or kick them from the world. And that's not all!"
        - "&3⚂ Get to know the blocks!&r\n \n&lHow do conditions work?\n \n&rIf a &6condition&r is met, the code inside the pistons will also execute! Check the player's name, item, block, or status."
        - "&2✉ Values for actions!&r\n \nSome actions place a chest where you will put values.\n \nThey can be &anumbers&r, &6text&7, &7locations&r, or even &citems&r!"
        - "&6🪣 Variables&r\n \n&lA variable&r is a storage unit that holds a value.\n \nYou can set any value in it and later use that value in an action!"
        - "&6🪣 Variables&r\n \n&lA list&r can store multiple values.\n \nYou can sort, add new values, retrieve, or delete them."
        - "&6🪣 Variables&r\n \n&lDictionaries&r store values by &lkeys&r!\n \nEach key has a value. You can add keys with values or retrieve values by key. It's very convenient!"
        - "&4🧰 Modules&r\n \n&0You can install prepared code by players&r!\n \nTo install a module, type /modules and choose module, that's useful for you. Or create own with manipulator. "
    lines-controller:
      name: "&cManipulator &a[← LMB] [RMB →] [F]"
      lore:
        - "&7Allows you to move action and"
        - "&7conditions block to left or right."
        - "&aPerfect for adding more actions!"
        - ""
        - "&7Also selects event blocks and allows"
        - "&7you to &acreate modules&7 or duplicate"
        - "&7blocks by pressing &eF&7."
        - ""
        - "&fIn hand:"
        - "&e Right-click:"
        - "&7  Move action blocks to the right"
        - "&e Left-click:"
        - "&7  Move action blocks to the left"
        - "&e F:"
        - "&7  Opens coding lines menu"
    arrow-not:
      name: "&cNOT Arrow &a[Right-click]"
      lore:
        - "&7Reverses the behavior of conditions"
        - "&7literally to the opposite!"
        - ""
        - "&7When a condition &cdoes not meet"
        - "&7the requirements, and it has"
        - "&7a &cNOT&7, the code inside"
        - "&7the condition will &aexecute&7."
        - ""
        - "&fIn hand:"
        - "&e Right-click on a condition sign:"
        - "&7  Toggle NOT on or off"
