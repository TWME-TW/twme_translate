  title: "%branding%"
  subtitle: "&fLet's &acreate&f in your worlds!"
  message: "\n <white>\n<white>\n <white>\n <white>%branding% <dark_gray>6.0\n<green> Well, it's possible!\n <white>\n<gold> ⭐ <white>Explore all <gold>worlds<white> using the compass!\n<light_purple> ❤ <white>Create your own world and <light_purple>invite <white>your friends!\n <yellow>⌚<white> Have fun and <yellow>create <white>whatever you want!\n \n<white>\n <white>"
