no-perms: "%prefix%&cInsufficient permissions!"
disabled: "&cThis feature is disabled :("
too-few-args: "&cNot enough arguments :("
cooldown: "%prefix%&cPlease wait %cooldown% seconds before using this command again."
maintenance: "%prefix%&cOops, it seems there's a maintenance break: this action is unavailable as maintenance is underway. Please wait until the maintenance is over!"
not-found-player: "&c Player is offline."
only-players: "&c This command can be used only as player."
only-alive: "%prefix%&cThis cannot be accessed by dead players, you need to respawn!"
only-debug: "&c This experimental feature cannot be accessed, because debug mode of OpenCreative+ is not activated. Caution: Some experimental features aren't stable and they can corrupt your worlds!"
commands:
  join:
    help: "%prefix%&fTo connect to the world with ID, use: &6/join ID"
    connecting: "%prefix%Connecting &6%player%&f to world %id%..."
    failed: "%prefix%&cFailed to connect to this world O_o"
  join-to:
    help: "%prefix%&fTo connect to the world, where player is currently in, use: &6/jointo Username"
  give:
    help: "%prefix%To give an item to yourself or a player in your world, use:\n &6/give ID &7- Give an item to yourself\n &6/give Username ID &7- Give an item to a player\n &6/give Username ID Amount &7- Give an item with a specific amount to a player"
    wrong: "%prefix%&cThis item does not exist O_o"
    given: "%prefix%You received item &6%material%&f x%amount%."
    given-player: "%prefix%You gave item &6%material%&f x%amount% to player &6%player%&f."
    wrong-amount: "%prefix%&cYou specified the amount incorrectly, it should be a number, for example /give Steve apple 10"
  game-mode:
    wrong: "%prefix%&cYou specified an incorrect game mode. Allowed modes: creative, survival, adventure, spectator."
    changed:
      creative: "%prefix%You are now in &6creative&f mode, allowing you to get any items, fly over the world, build, and take no damage."
      survival: "%prefix%You switched to &6survival&f mode, allowing you to modify the world and take damage."
      spectator: "%prefix%You are now &6spectating&f the world! Possess a mob or player by left-clicking."
      adventure: "%prefix%You are now in &6adventure&f mode, where you cannot place or break blocks. Explore the world!"
    changed-player:
      creative: "%prefix%You set &6creative&f mode for player &6%player%&f. Now they can fly, get any items, and build.\n &cHowever, they can still break blocks in your world. If you don't trust them, set their mode to adventure: /gamemode adventure %player%"
      survival: "%prefix%You set &6survival&f mode for player &6%player%&f. Now they can build, break blocks, and take damage."
      spectator: "%prefix%You set &6spectator&f mode for player &6%player%, now they can only observe the world."
      adventure: "%prefix%You set &6adventure&f mode for player &6%player%, now they can explore and take damage, but cannot place or break blocks."
    help: "%prefix%In your world, you can switch the game mode for yourself or another player.\n &6/gamemode creative &7- Switch to creative mode\n &6/gamemode Username creative &7- Set a player to creative mode"
  time:
    help: "%prefix%Change the time of day in your world — this will affect the sky, block brightness, and world behavior.\n &6/time set 0 &7- Sets day\n &6/time set 12500 &7- Sets evening\n &6/time set 15000 &7- Sets night\n &6/time add 1000 &7- Skips 1000 ticks"
    changed: "%prefix%You set the world time to: &6%time%"
  weather:
    help: "%prefix%Change the weather in your world to sunny, rainy, or even stormy!\n &6/weather sun &7- Sets sunny weather\n &6/weather rain &7- Sets rainy weather\n &6/weather thunder &7- Sets rain with thunder and lightning"
    changed:
      sun: "%prefix%The weather is now &6sunny&f and clear."
      rain: "%prefix%It is now &6raining&f, monsters will not burn."
      thunder: "%prefix%It is now &6thundering&f, beware of lightning!"
  teleport:
    help: "%prefix%You can teleport in your world to coordinates, or teleport players.\n &6/teleport X Y Z YAW PITCH &7- Teleport to coordinates\n &6/teleport Username &7- Teleport to a player\n &6/teleport FirstPlayer SecondPlayer &7- Teleport the first player to the second player"
    teleported: "%prefix%You teleported to player &6%player%&f."
    teleported-player: "%prefix%You teleported player &6%first%&f to &6%second%&f."
    teleported-coords: "%prefix%You teleported to coordinates: &6%x% %y% %z% %yaw% %pitch%"
    out-of-borders: "%prefix%&cCannot teleport beyond the world border."
  edit:
    help: "%prefix%Edit the name and description of the item in your hand.\n &6/edit name New Name &7- Rename the item\n &6/edit lore 1 Description Line &7- Edit a specific description line by its number \n &6/edit addlore Description Line &7- Add a new description line\n &6/edit clear &7- Clear the item's name and description"
    renamed: "%prefix%Item renamed: %name%"
    set-lore: "%prefix%Set line %number%: %lore%"
    cleared: "%prefix%Item's name and description cleared."
    item: "%prefix%&cHold the item in your main hand."
    lines-limit: "%prefix%&cDescription limit of %limit% lines reached."
    text-limit: "%prefix%&cCharacter limit of %limit% reached."
    not-number: "%prefix%&cNot a number: %argument%"
  play-sound:
    help: "%prefix%You can play a sound for yourself or a player.\n &6/playsound Sound Volume Speed Seed &7- Play a sound for yourself\n &6/playsound Username Sound Volume Speed Seed &7- Play a sound for a player"
    played: "%prefix%&fPlayed sound &6%sound% &fwith volume &6%volume%&f and speed &6%pitch%&f to player &6%player%"
    bad-sound: "%prefix%&cCan't find sound called %sound% O_o"
  stop-sound:
    help: "%prefix%You can stop sounds for yourself or another player.\n &6/stopsound &7- Stop all sounds for yourself\n &6/stopsound Categories/Sounds &7- Stop specific sounds or sounds from categories for yourself\n &6/stopsound Categories/Sounds Nickname &7- Stop sounds for another player"
    stopped-sound: "%prefix%&fStopped sound &6%sound%&f for player &6%player%&f."
    stopped-category: "%prefix%&fStopped sounds of category &6%category%&f for player &6%player%&f."
    stopped-all: "%prefix%&fStopped all sounds for player &6%player%&f."
  locate:
    help: "%prefix%To find the world where a player is playing, type in the chat: &6/locate Username"
    found: "%prefix%&fPlayer &6%player%&f is currently playing in the world: \n&f %planetName%\n &f\n&a &a &n[Click to join]&f\n &f"
    offline: "%prefix%&cThe player is not currently playing in any worlds."
modules:
  help: "%prefix%Module is prepared coding blocks lines, made by players, that add some features in your world. They can be inserted in developers world. To browse modules use &6/module&f command.\n&6 /module load ID &f- Loads module by specified ID"
  not-found: "%prefix%&cCan't find module with ID %id% O_o"
  private: "%prefix%&cThis module is private, so only owner can install it.. :("
  created: "%prefix%You created a &6module&f! Every player &6can install&f your selected code. Now you can change it's display name, description and icon in modules browser."
  deleted: "%prefix%Module &6%moduleID%&f was deleted :("
  installed: "%prefix%&6%player%&f installed module &6%moduleName% &fby %moduleOwner%"
  few-space: "%prefix%&cSeems like all your coding platforms are filled with code! To load this module we need %required% free rows of code."
  error: "%prefix%&cCan't save code for module, please fix problems in code!"
  fail: "%prefix%&cFailed to load module %moduleName%&c by %moduleOwner%"
  default-name: "&7%player%'s Module"
  default-description: "&7My cool module!"
  info: "%prefix%&fModule Information: &6%moduleName%\n &f Description: &6%moduleDescription%&r\n &f Owner: &6%moduleOwner%\n &f ID: &6%moduleID%\n &f Created: &6%moduleCreationTime%\n &f Downloads: &6%moduleDownloads%\n &f Reputation: &6%moduleReputation%\n &f Access: &6%moduleSharing%"
  rating:
    not-installed: "%prefix%&cYou can't rate the module before you install it in world."
    liked: "%prefix%You &6liked&f this module :)"
    disliked: "%prefix%You &6disliked&f this module.. :("
    already-rated: "%prefix%&cYou already rated this module before.."
  sharing:
    public: "&aPublic"
    private: "&cPrivate"
  list:
    amount: "%prefix%List of all modules (%amount%):"
    module: "&6%moduleID% &7- %moduleOwner%&7 - &7%moduleName%&f"
profiles:
  default-description: "&7I create awesome worlds!"
  genders:
    male: "&3Male ♂"
    female: "&dFemale ♀"
    non-binary: "&eNon-binary 🜬"
    unknown: "&7Not specified"
environment:
  help: "%prefix%Manage code, variables, and the world for developers.\n \n&6 /env variables clear &f- Clear variables\n&6 /env variables size &f- Number of variables\n&6 /env variables list &f- List of variables"
  variables:
    cleared: "%prefix%All variables have been successfully removed."
    size: "%prefix%There are currently &6%count% variables&f in the world.\n &fThis includes all list contents and keys with values from dictionaries."
    get:
      empty: "%prefix%&cThis variable does not exist :("
      message: "%prefix%Variable data &6%variable%&f:\n &fVariable type: %type%\n &fValue type: %valuetype%\n &fValue: &6%value%"
    list:
      empty: "%prefix%There are currently no variables set in the world."
      header: "\n%prefix%List of variables in the world (&6%current% &fout of &6%amount%&f total):"
      variable: "&f  &6 %name% &fType: &6%type%&f Value: &6%value%"
      next-page: "&a                   [Next →]"
      previous-page: "&c[← Back]"
      navigation: "\n&f Navigation: "
    set:
      help: "%prefix%To change variable value type in chat:\n &6/env var set [Variable Name] [global/saved] [text,number,item,location] (Value)\n&f Item, that will be used in setting item is from main hand."
      limit: "%prefix%&cReached limit of variables (%limit%)!"
      message: "%prefix%Assigned variable %variable%&f: &7%value%"
  save-location:
    enabled: "%prefix%Now when you join coding world you &6will be teleported&f to the last location."
    disabled: "%prefix%You &6disabled teleportation &fto the last location on coding world join."
  night-vision:
    enabled: "%prefix%Now when you join coding world you &6will get night vision&f!"
    disabled: "%prefix%You &6disabled night vision&f on coding world join."
  drops:
    enabled: "%prefix%Now coding items will be &6dropped &fwhen you destroy a chest."
    disabled: "%prefix%You &6disabled coding items drop&f on chest destroy."
  debug:
    help: "%prefix%Debug mode sends event, action, and condition execution to the chat, along with their internal values.\n &6/env debug enable &f- Enable debug mode\n &6/env debug disable &f- Disable debug mode"
    enabled: "%prefix%&fWorld developer &6%player% &fenabled debug mode."
    disabled: "%prefix%&fWorld developer &6%player% &fdisabled debug mode."
  values:
    text: "&6Text"
    number: "&aNumber"
    event-value: "&6Event Value"
    variable: "&eVariable"
    location: "&fLocation"
    boolean: "&eBoolean"
    particle: "&dParticle"
    item: "&cItem"
    potion: "&bPotion"
    list: "&eList"
    vector: "&bVector"
    map: "&eMap"
  execute:
    help: "%prefix%Call executors by yourself, and they will execute code.\n &6/env execute function [Name] &f- Call Function.\n &6/env execute method [Name] &f- Call Method.\n &6/env execute player_join [Player] &f- Call Player Join event."
    offline: "%prefix%&cPlayer is not in world."
    function: "%prefix%Calling function &9%function%&f..."
    function-not-found: "%prefix%&cThis function doesn't exist O_o"
    method: "%prefix%Calling method &a%method%&f..."
    method-not-found: "%prefix%&cThis method doesn't exist O_o"
  platform:
    claimed: "%prefix%Created a &6new platform &ffor coding, now you can place coding blocks here too!"
    limit: "%prefix%&cYou reached a limit of %amount% platforms, you can't create new coding platforms anymore :("
  hints:
    cycle: "&aNumber &f- Time in ticks, &6Text&f - Name"
    function: "&fClick with &6Text&f in hand to rename"
    method: "&fClick with &6Text&f in hand to rename"
    launch-function: "&7RMB &f- Select a function, &7Shift+RMB &f- Set target"
    launch-method: "&7RMB &f- Select a method, &7Shift+RMB &f- Set target"
    event: "&7RMB &f- Select an event"
    action: "&7RMB &f- Select an action, &7Shift+RMB &f- Set target"
    condition: "&7RMB &f- Select a condition, &7Shift+RMB &f- Set target"
    variable: "&7Chat &f- Rename, &7RMB &f- Change type"
    event-value: "&7RMB &f- Select a type, &7Shift+RMB &f- Set target"
    number: "&7Chat &f- Set the number, &7RMB &f- Copy in chat"
    text: "&7Chat &f- Set the text, &7RMB &f- Copy in chat"
    potion: "&7Chat &f- Set duration and strength"
    boolean: "&7RMB &f- Change type"
    location:
      build: "&7RMB &f- Set location, &7LMB &f- Return to coding"
      dev: "&7LMB &f- Teleport to world, &7F &f- Teleport to location"
    vector: "&7Chat &f- Set coordinates of vector"
    particle: "&7RMB &f- Select a type, &7Shift+RMB &f- Show particle"
    color: "&7Chat &f- Set color"
    lines-controller: "&7LMB/RMB &f- Move action or condition"
    arrow-not: "&7LMB &f- Add/remove NOT in condition"
    fly-speed-changer: "&7RMB &f- Change flight speed"
    debug-torch: "&7RMB &f- Mark event for debugging"
    holding-event: "&fPlace the block at the &bbeginning of the line"
    holding-action: "&fPlace the block &7after the event"
  duplication:
    success: "%prefix%&fCode lines successfully &6copied &fto the new location :)"
    fail: "%prefix%&cThere was a problem copying the code lines.. :("
    few-space: "%prefix%&cIt seems all platforms are filled with your code! To paste code lines, you need %required% free rows for coding blocks."
  prompter:
    help: "%prefix%You can try to generate a simple code by your words:\n &6/env make [Your wishes]"
    thinking: "%prefix%Thinking, please wait..."
    disabled: "%prefix%&cPrompt generation is disabled :("
    few-args: "%prefix%&cYou need to describe your ideas in more detail, this is too few words.. O_o"
    limited: "%prefix%&cSeems like the prompt handler reached limit of requests, try again later :("
    bad-prompt: "%prefix%&cTry to explain your wishes more clear, for example: When player clicks on magma block, it will give random item to player."
    timeout: "%prefix%&cSeems like the prompt handler was thinking for too long.. Well, you have to make your wishes smaller :("
    unauthorized: "%prefix%&cSeems like token of prompt handler is expired, contact the admins :("
    unavailable: "%prefix%&cSeems like the prompt handler is down, try again later :("
    unknown-host: "%prefix%&cSeems like server is not connected to the Internet, or site of prompt handler doesn't exist :("
    few-space: "%prefix%&cSeems like the code you requested requires a lot of space! Try to split your wishes, or free space in coding world."
    success: "%prefix%Successfully&a generated&f a code from your wish in %time% seconds :)\n &6%idea%\n&fTo apply changes type &6/play&f."
    broadcast:
      request: "%prefix%&6%player%&f requested prompt handler to create code by their wish, a new code can appear soon... &3[Details]"
      success: "%prefix%&fPrompt handler &6successfully&f installed code by &6%player%&f. "
      failed: "%prefix%&cPrompt handler failed to create code by %player%'s wish.. :("
      hover: "&6%idea%"
