  unknownfunctionexception: "Failed to launch function %name%, because it doesn't exist in code."
  unknownmethodexception: "Failed to launch method %name%, because it doesn't exist in code."
  unknowncycleexception: "Failed to start or end cycle %name%, because it doesn't exist in code."
  numberformatexception: "A number was expected, but the item did not contain one. Check the items in the chest for this action."
  toolongtextexception: "Too long text was tried to write to variable. Please substring it with variable action Substring text. "
  collectionwithcollectionexception: "Tried to store a list as element of list. Use Merge Lists action instead."
  toomanyopenedmenusexception: "Opened too many menus for %player%. Please add cooldown between opening menus."
  toomanyrepeatsexception: "Too many repeats at once! Please add control action Wait to the end of repeat before closing piston."
  nottrustedlinkexception: "Site %link% is not trusted by server. Please contact server admins."
  illegalargumentexception: "An incorrect value was found in the chest. You might have specified a negative number, or a variable returned an incorrect value, or something couldn't be retrieved from the value. Check the chest's contents!"
