        - '&7程式編寫的基本概念。'
      pages:
        - "&9☻ 你已進入程式編寫的世界！&r\n \n在這裡，你將使用物品欄中的 &3積&7木&6塊&9來&c編寫程式&r。\n \n這本書將協助你學習程式編寫的基礎，&c翻頁以繼續……"
        - "&3⚂ 認識積木塊！&r\n \n將 &3事件&0 積木塊放置在 &9藍色玻璃&0 上以觸發 &7動作&0 與 &6條件&0，這些動作與條件則需放置在
