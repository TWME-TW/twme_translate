        - "&3⚂ 認識積木塊！&r\n \n&l什麼是動作？\n \n&7動作&r 讓你能夠控制玩家：給予物品、傳送，或是將他們踢出世界。不只如此，還有更多功能！"
        - "&3⚂ 認識積木塊！&r\n \n&l條件是如何運作的？\n \n&r若符合某項 &6條件&r，活塞內的程式碼也會隨之執行！你可以檢查玩家的名稱、物品、方塊或狀態。"
        - "&2✉ 動作的數值！&r\n \n某些動作會放置一個箱子，你可以在其中放入數值。\n \n這些數值可以是 &a數字&r、&6文字&7、&7位置&r，甚至是
          &c物品&r！"
        - "&6🪣 變數&r\n \n&l變數&r 是一種用來儲存數值的容器。\n \n你可以將任何數值存入其中，並在稍後的動作中使用該數值！"
        - "&6🪣 變數&r\n \n&l列表&r 可以儲存多個數值。\n \n你可以對其進行排序、新增數值、檢索或刪除它們。"
        - "&6🪣 變數&r\n \n&l字典&r 透過 &l鍵值&r 來儲存數值！\n \n每個鍵都有對應的數值。你可以新增帶有數值的鍵，或透過鍵來檢索數值。這非常方便！"
        - "&4🧰 模組&r\n \n&0你可以安裝由其他玩家準備好的程式碼！&r\n \n若要安裝模組，請輸入 /modules 並選擇模組，這對你很有幫助。或者，你也可以使用操作器來建立自己的模組。"
