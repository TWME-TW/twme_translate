        (-確認)'
      explanation:
        - 範例：
        - /cmi setwarp spawn - 簡單設定傳送點至出生點
        - /cmi setwarp spawn true - 建立傳送點，且使用時需具備 cmi.command.warp.[傳送點名稱] 權限節點
        - /cmi setwarp spawn hand - 建立傳送點，並將手持物品作為該傳送點在介面中的圖示
        - /cmi setwarp spawn 13 - 建立傳送點，並設定其在介面中的顯示欄位（1-54）
        - /cmi setwarp spawn true hand 13 - 建立傳送點，使用手持物品作為圖示、設定欄位為 13，並要求具備權限
