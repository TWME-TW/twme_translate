  bossbarmsg:
    help:
      info: 發送 Boss 血條訊息給玩家
      args: '[playerName/all] (-sec:[秒數])(-t:[顯示時長]) (-n:血條名稱) (-p:[最大值/當前值]) (-c:[顏色])
        (-s:[1,6,10,12,20]) (-cmd:"指令;;指令2") (-pcmd:"指令;;指令2") (-a:[刻度]) [訊息] (-cancel:血條名稱)'
      explanation:
        - 進度條與文字內容皆支援 PlaceHolderAPI
        - 時間採用一般定義方式，例如 1s 代表一秒，1m 代表一分鐘。 此設定將決定血條在自動隱藏前，會對玩家顯示多久
        - 血條名稱為選填，若定義相同的名稱，則當前的血條將會更新 為新的資訊
        - 顏色可選：red（紅）、green（綠）、pink（粉紅）、purple（紫）、white（白）、yellow（黃）
        - 最大值與當前值決定了血條的填充比例，可使用 PlaceHolderAPI 變數來進行動態更新
        - 範例：
        - /cmi bossbar Zrips BossBarTitle
        - /cmi bossbarmsg all -t:1s -p:%server_max_players%/%server_online% 
          -n:testbar -c:red &2血條標題 %server_online%/%server_max_players% 
          &e%cmi_user_name%
        - /cmi bossbarmsg all -p:+1 -n:testbar - 將會為指定名稱的當前進度條增加 1%
        - /cmi bossbarmsg all -p:-1 -n:testbar - 將會從指定名稱的當前進度條中扣除 1%
        - /cmi bossbarmsg all -s:10 -n:testbar - 將會把指定名稱的血條樣式設為 10 個區段
        - /cmi bossbarmsg all -sec:5 - 將會從 0 到 5 進行 5 秒的計數
        - /cmi bossbarmsg all -sec:-5 - 將會從 5 到 0 進行 5 秒的倒數
        - -cmd：若目標為特定玩家，則會對該玩家執行指令；若目標為所有人（all），則僅會執行一次。若搭配「all」變數使用，此指令不會轉換像 
          [playerName] 這類的變數。請改用 -pcmd：
        - -pcmd：若目標為「all」，則會對每一位玩家分別執行指令
        - https://www.zrips.net/cmi/commands/bossbarmsg-handling/
