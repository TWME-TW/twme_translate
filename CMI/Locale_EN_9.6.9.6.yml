# 完整的顏色代碼支持和一些變數
# 請記住，變數在某些行中無法運行，而在其他行中則可以運行:)
# 只需保持它們現在的位置，一切都會好起來:)
# 某些行可以設置全局變數。對玩家有影響。例如 /heal Zrips 然後會使用 Zrips 的數據
# [serverName] 顯示伺服器名稱
# [playerName] 顯示目標玩家名稱
# [playerDisplayName] 顯示目標玩家顯示名稱
# [lvl] 顯示目標玩家等級
# [exp] 顯示目標玩家總經驗值
# [hp] 顯示目標玩家生命值
# [maxHp] 顯示目標玩家最大生命值
# [hunger] 顯示目標玩家飢餓值
# [gameMode] 顯示目標玩家遊戲模式
# [prefix] 顯示目標玩家前綴（如果可能）
# [suffix] 顯示目標玩家後綴（如果可能）
# 發送者是控制台或執行命令的玩家。例如 Zrips 執行 /heal Zhax 然後會使用 Zrips 的數據
# [senderName] 顯示發送者玩家名稱
# [senderDisplayName] 顯示發送者玩家顯示名稱
# [senderLvl] 顯示發送者玩家等級
# [senderExp] 顯示發送者玩家總經驗值
# [senderHp] 顯示發送者玩家生命值
# [senderMaxHp] 顯示發送者玩家最大生命值
# [senderHunger] 顯示發送者玩家飢餓值
# [senderGameMode] 顯示發送者玩家遊戲模式
# [senderPrefix] 顯示發送者玩家前綴（如果可能）
# [senderSuffix] 顯示發送者玩家後綴（如果可能）
# 資源是用於額外信息的玩家。例如 Zrips 執行 /tp Zhax Zrips 然後會使用 Zhax 的數據作為新玩家位置
# [sourceName] 顯示資源玩家名稱
# [sourceDisplayName] 顯示資源玩家顯示名稱
# [sourceLvl] 顯示資源玩家等級
# [sourceExp] 顯示資源玩家總經驗值
# [sourceHp] 顯示資源玩家生命值
# [sourceMaxHp] 顯示資源玩家最大生命值
# [sourceHunger] 顯示資源玩家飢餓值
# [sourceGameMode] 顯示資源玩家遊戲模式
# [sourcePrefix] 顯示資源玩家前綴（如果可能）
# [sourceSuffix] 顯示資源玩家後綴（如果可能）
# ***********************************************
# 某些行支持將它們發送到自定義位置，例如動作欄、標題、副標題，甚至創建 JSON/可點擊消息
# 如果行以 !toast! 開頭，則玩家將收到 toast 消息（1.12 及更高版本的進度彈出）。可以使用一些額外變量來定義類型和圖標。例如：!toast! -t:goal -icon:paper Hello world!
# 如果行以 !actionbar! 開頭，則玩家將收到定義在此變量後的動作欄消息
# 如果行以 !actionbar:[秒]! 開頭，則玩家將在指定時間內收到動作欄消息
# 如果行以 !broadcast! 開頭，則所有人都會收到消息。您可以添加額外的 !toast! !actionbar! 或 !title! 將消息發送到特定位置，例如 !broadcast!!title!
# 如果行以 !customtext:[cTextName]! 開頭，則將顯示提供名稱的自定義文本。在使用 !broadcast! 後的情況下，所有在線的玩家都會收到此自定義文本消息
# 如果行以 !title! 開頭，則玩家將收到定義在此變量後的標題消息，此外，它可以包含 !subtitle!，這將添加副標題消息。可以使用 !title:4.5! 定義可選時間，這將保持標題消息顯示 4.5 秒
# 如果行以 !bossbar:[name]-[timer]! 開頭，則玩家將收到定義在此變量後的 bossbar 消息，此外您可以定義此消息的可見時間。您需要定義 bossbar 名稱，可以是任何您想要的，但具有相同名稱的行將彼此覆蓋，以防止堆疊
#
#
#
# 注意！自 CMI 版本 9.0.0.0 起，一些本地行已移至 CMILib 文件。這是為了在多個插件中集中使用一些最常用的行。
# 更新 CMILib 文件中的本地後，執行 /CMIL RELOAD 命令以使更改生效

