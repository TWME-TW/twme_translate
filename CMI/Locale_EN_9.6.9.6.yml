  bossbarmsg:
    help:
      info: '&e向玩家發送 BossBar 消息'
      args: '[playerName/all] (-sec:[seconds])(-t:[timeToKeepFor]) (-n:nameOfBar) (-p:[maxValue/current]) (-c:[color]) (-s:[1,6,10,12,20]) (-cmd:"command;;command2") (-a:[ticks]) [message] (-cancel:nameOfBar)'
      explanation:
      - 支持 PlaceHolderAPI 來動態更新進度和文本本身
      - 時間以常規方式定義，例如 1s 是一秒，1m 是一分鐘。這將確定在自動隱藏前保持條顯示的時間
      - nameOfBar 是可選項，當定義相同的名稱時，當前條將使用新信息更新
      - '顏色可以是：紅色、綠色、粉紅色、紫色、白色、黃色'
      - 最大值和當前值決定條的填充，支持 PlaceHolderAPI 變量進行動態更新
      - '例子：'
      - /cmi bossbar Zrips BossBarTitle
      - /cmi bossbarmsg all -t:1s -p:%server_max_players%/%server_online% -n:testbar -c:red &2條標題 %server_online%/%server_max_players% &e%cmi_user_name%
      - /cmi bossbarmsg all -p:+1 -n:testbar - 將當前進度條名稱增加 1%
      - /cmi bossbarmsg all -p:-1 -n:testbar - 將當前進度條名稱減少 1%
      - /cmi bossbarmsg all -s:10 -n:testbar - 將 bossbar 樣式設置為 10 段
      - /cmi bossbarmsg all -sec:5 - 將從 0 到 5 秒計時
      - /cmi bossbarmsg all -sec:-5 - 將從 5 到 0 秒計時
      - http://www.zrips.net/cmi/commands/bossbarmsg-handling/
