  bossbarmsg:
    help:
      info: 傳送 boss bar 訊息給玩家
      args: '[playerName/all] (-sec:[seconds])(-t:[timeToKeepFor]) (-n:nameOfBar)
        (-p:[maxValue/current]) (-c:[color]) (-s:[1,6,10,12,20]) (-cmd:"command;;command2")
        (-pcmd:"command;;command2") (-a:[ticks]) [message] (-cancel:nameOfBar)'
      explanation:
        - 支援 PlaceHolderAPI 用於進度與文字本身
        - 時間以一般方式定義，例如 1s 代表一秒，1m 代表一分鐘。這將決定在自動隱藏前，持續顯示 boss bar 給玩家的時間長度
        - nameOfBar 為選項，當定義相同的名稱時，現有的 bar 會以新資訊更新
        - 顏色可為：紅色, 綠色, 粉紅色, 紫色, 白色, 黃色
        - max 與 current 值決定 bar 的填充程度，PlaceHolderAPI 變數可用於動態更新
        - 範例：
        - /cmi bossbar Zrips BossBarTitle
        - /cmi bossbarmsg all -t:1s -p:%server_max_players%/%server_online% 
          -n:testbar -c:red &2Title of bar %server_online%/%server_max_players% 
          &e%cmi_user_name%
        - /cmi bossbarmsg all -p:+1 -n:testbar - 將會為指定名稱的目前進度 bar 增加 1%
        - /cmi bossbarmsg all -p:-1 -n:testbar - 將會從指定名稱的目前進度 bar 扣除 1%
        - /cmi bossbarmsg all -s:10 -n:testbar - 將會依據 bar 名稱將 bossbar 風格設定為 10 
          個分段
        - /cmi bossbarmsg all -sec:5 - 將會從 0 計數至 5，持續 5 秒
        - /cmi bossbarmsg all -sec:-5 - 將會從 5 計數至 0，持續 5 秒
        - "-cmd: 會對單一玩家執行指令（若目標為特定玩家），或對所有玩家（all）僅執行一次。若與 'all' 變數一起使用，則不會翻譯變數如 [playerName]。請改用
          -pcmd:"
        - "-pcmd: 若目標為 'all'，會對每位玩家執行指令"
        - https://www.zrips.net/cmi/commands/bossbarmsg-handling/
